<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="refresh" content="3;url=home.html" />
<title>Stackly — Loading</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#10202F;
    --paper:#EEF0EC;
    --signal:#FF6A2B;
    --rust:#B8360C;
    --slate:#55606B;
    --line:#D8DAD2;
    --font-display:'Space Grotesk', sans-serif;
    --font-mono:'IBM Plex Mono', monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{
    height:100%;
    background:var(--paper);
  }
  body{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:28px;
    min-height:100vh;
    font-family:var(--font-mono);
    overflow:hidden;
  }

  .loader-logo{
    display:flex;
    align-items:center;
    gap:2px;
    font-family:var(--font-display);
    font-weight:700;
    font-size:34px;
    color:var(--ink);
    opacity:0;
    animation:logo-in .6s ease forwards;
  }
  .loader-logo span{ color:var(--signal); }

  @keyframes logo-in{
    from{ opacity:0; transform:translateY(8px); }
    to{ opacity:1; transform:translateY(0); }
  }

  .loader-track{
    width:220px;
    height:3px;
    border-radius:999px;
    background:var(--line);
    overflow:hidden;
  }
  .loader-fill{
    height:100%;
    width:0%;
    border-radius:999px;
    background:linear-gradient(90deg, var(--rust), var(--signal));
    animation:fill-progress 2.6s cubic-bezier(.2,.7,.2,1) .3s forwards;
  }
  @keyframes fill-progress{
    from{ width:0%; }
    to{ width:100%; }
  }

  .loader-caption{
    font-size:11.5px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--slate);
    opacity:0;
    animation:logo-in .6s ease .2s forwards;
  }

  @media (prefers-reduced-motion: reduce){
    .loader-logo, .loader-caption{ animation:none; opacity:1; }
    .loader-fill{ animation:none; width:100%; transition:none; }
  }
</style>
</head>
<body>

  <div class="loader-logo">Stackly<span>.</span></div>
  <div class="loader-track"><div class="loader-fill"></div></div>
  <div class="loader-caption">Loading The Site…</div>

  <script>
    setTimeout(function () {
      window.location.href = "home.html";
    }, 3000);
  </script>

</body>
</html>
